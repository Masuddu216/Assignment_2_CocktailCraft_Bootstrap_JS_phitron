<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CocktailCraft — Drink Explorer</title>

  <!-- Bootstrap-->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-dark text-light">

  <!-- ── NAVBAR ── -->
  <nav class="navbar navbar-dark bg-black border-bottom border-secondary sticky-top">
    <div class="container-fluid px-4">
      
      <!-- Logo — click to show all -->
      <span class="navbar-brand fw-bold fs-4 logo-link" id="logoBtn">🍹 CocktailCraft</span>
      <div class="d-flex gap-2" style="width:45%">
        <input class="form-control bg-secondary text-light border-0" type="text" id="searchInput" placeholder="Search a cocktail…" />
        <button class="btn btn-warning fw-semibold px-4" id="searchBtn">
          <i class="bi bi-search me-1"></i>Search
        </button>
      </div>
    </div>
  </nav>

  <!-- ── MAIN ── -->
  <div class="container-fluid px-4 py-4">
    <div class="row g-4 align-items-start">

      <!-- LEFT: drink cards -->
      <div class="col-lg-8">
        <!-- Card Grid -->
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4" id="product-container"></div>

        <!-- Not Found -->
        <div id="not-found" class="d-none text-center py-5">
          <i class="bi bi-emoji-frown display-3 text-secondary"></i>
          <p class="mt-3 fs-5 text-secondary">Your searched drink is not found.</p>
        </div>

        <!-- Pagination -->
        <div class="d-flex justify-content-center mt-4" id="pagination-wrapper">
          <nav>
            <ul class="pagination pagination-dark" id="pagination"></ul>
          </nav>
        </div>
      </div>

      <!-- RIGHT: cart panel -->
      <div class="col-lg-4">
        <div class="card bg-black border border-secondary sticky-top" style="top:80px">

          <!-- Cart Header -->
          <div class="card-header border-secondary py-3">
            <h5 class="mb-0 fw-bold text-center text-light">
              Total Cart : <span class="text-warning" id="groupCount">0</span>
            </h5>
          </div>

          <!-- Cart Table Header -->
          <div class="d-none" id="cartTableHead">
            <table class="table table-dark mb-0 border-bottom border-secondary">
              <thead>
                <tr class="text-secondary text-uppercase small">
                  <th class="text-center" style="width:40px">SL</th>
                  <th style="width:50px">Img</th>
                  <th>Name</th>
                </tr>
              </thead>
            </table>
          </div>

          <!-- Cart Items -->
          <div class="card-body p-0" id="groupList">
            <p class="text-secondary text-center py-4 px-3 mb-0">No drinks added yet.</p>
          </div>

        </div>
      </div>

    </div>
  </div>

  <!-- ── DETAILS MODAL ── -->
  <div class="modal fade" id="detailsModal" tabindex="-1" aria-labelledby="detailsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content bg-dark text-light border border-secondary">
        <div class="modal-header border-secondary">
          <h5 class="modal-title fw-bold" id="detailsModalLabel">Drink Details</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-0" id="modalBody"></div>
      </div>
    </div>
  </div>

  <!-- ── LIMIT MODAL ── -->
  <div class="modal fade" id="limitModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content bg-dark text-light border border-warning text-center">
        <div class="modal-body py-5 px-4">
          <div class="display-3 mb-3">🚫</div>
          <h4 class="fw-bold">Group Full!</h4>
          <p class="text-secondary mt-2">
            You can't add more than <strong class="text-warning">7 drinks</strong> to a group.
          </p>
          <button class="btn btn-warning fw-bold px-5 mt-2" data-bs-dismiss="modal">Got it</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
